<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ラブファイル - ユーザーレビュー</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #FFF5FA; color: #55444A; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .feedback-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .star-rating { color: #FFCC00; font-size: 1.2rem; }
        .nickname { font-weight: bold; margin-right: 10px; }
        .date { font-size: 0.8rem; color: #99888D; }
        
        /* 投稿フォーム */
        form { background: white; padding: 30px; border-radius: 20px; margin-bottom: 40px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #F0E0E5; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #E86FA4; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" style="text-decoration: none; color: #E86FA4;">← ホームへ戻る</a>
        <h1>カスタマーレビュー</h1>

        <form method="POST">
            <h3>レビューを書く</h3>
            <input type="text" name="nickname" placeholder="名前" required>
            <select name="rating" required>
                <option value="5">★★★★★ </option>
                <option value="4">★★★★☆ </option>
                <option value="3">★★★☆☆ </option>
                <option value="2">★★☆☆☆ </option>
                <option value="1">★☆☆☆☆ </option>
            </select>
            <textarea name="comment" placeholder="入力" rows="4" required></textarea>
            <button type="submit">送信する</button>
        </form>

        <div class="review-list">
            {% for f in feedbacks %}
            <div class="feedback-card">
                <span class="nickname">{{ f.nickname }}</span>
                <span class="star-rating">
                    {% for i in range(f.rating) %}★{% endfor %}
                </span>
                <p>{{ f.comment }}</p>
                <span class="date">{{ f.date_posted.strftime('%Y/%m/%d') }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
